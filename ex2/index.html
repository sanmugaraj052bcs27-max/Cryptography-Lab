<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crypto Visualizer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="sidemenu">
    <h2> Crypto Lab</h2>
    <button onclick="loadPage('aes')">AES</button>
    <button onclick="loadPage('des')">DES</button>
  </div>

  <div class="content">
    <iframe id="frame" src="/aes" style="width:100%;height:100%;border:none;"></iframe>
  </div>

</div>

<script>
function loadPage(page){
  document.getElementById("frame").src = "/" + page;
}
</script>

</body>
</html>
