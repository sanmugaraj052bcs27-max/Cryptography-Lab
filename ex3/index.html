<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RSA Cryptography Lab</title>
  <style>
    :root {
      --primary: #00f2fe;
      --accent: #4facfe;
      --bg: #0f172a;
      --card: rgba(30, 41, 59, 0.7);
      --text: #f8fafc;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top right, #1e293b, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    .container {
      width: 90%;
      max-width: 800px;
      background: var(--card);
      backdrop-filter: blur(12px);
      padding: 40px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    h2 {
      text-align: center;
      font-weight: 300;
      letter-spacing: 2px;
      margin-bottom: 30px;
      color: var(--primary);
      text-transform: uppercase;
    }

    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }

    input, select {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 12px 15px;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
    }

    .full-width { grid-column: span 2; }

    button {
      background: linear-gradient(135deg, var(--accent) 0%, var(--primary) 100%);
      color: #0f172a;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .output-section {
      margin-top: 30px;
      display: none; /* Shown via JS when data arrives */
    }

    .output-card {
      background: rgba(0, 0, 0, 0.3);
      padding: 20px;
      border-left: 4px solid var(--primary);
      border-radius: 4px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      line-height: 1.6;
      color: #cbd5e1;
    }

    .label {
      color: var(--primary);
      font-weight: bold;
      margin-right: 10px;
    }

    .step-log {
      margin-top: 15px;
      font-size: 12px;
      color: #94a3b8;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 10px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2> RSA Encryption Lab</h2>

  <div class="input-grid">
    <input type="number" id="p" placeholder="Prime P (e.g. 61)">
    <input type="number" id="q" placeholder="Prime Q (e.g. 53)">
    
    <button class="full-width" onclick="generateE()">Step 1: Calculate Public Exponents (e)</button>
    
    <select id="eSelect" style="display:none;" class="full-width"></select>
    
    <input type="text" id="message" placeholder="Message to Encrypt" class="full-width">
    
    <button class="full-width" onclick="runRSA()" style="background: #10b981; color: white;">Step 2: Execute RSA Algorithm</button>
  </div>

  <div id="outputContainer" class="output-section">
    <div class="output-card" id="result"></div>
  </div>
</div>

<script>
async function generateE() {
  const p = document.getElementById("p").value;
  const q = document.getElementById("q").value;

  const response = await fetch("/generateE", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ p, q })
  });

  const data = await response.json();

  if (data.error) {
    alert(data.error);
    return;
  }

  const select = document.getElementById("eSelect");
  select.innerHTML = '<option value="" disabled selected>Select an "e" value...</option>';

  data.possibleE.forEach(val => {
    const option = document.createElement("option");
    option.value = val;
    option.text = `e = ${val}`;
    select.appendChild(option);
  });

  select.style.display = "block";
}

async function runRSA() {
  const p = document.getElementById("p").value;
  const q = document.getElementById("q").value;
  const e = document.getElementById("eSelect").value;
  const message = document.getElementById("message").value;

  if(!e) { alert("Please select an 'e' value first!"); return; }

  const response = await fetch("/rsa", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ p, q, e, message })
  });

  const data = await response.json();
  const outputContainer = document.getElementById("outputContainer");
  const resultDiv = document.getElementById("result");

  if (data.error) {
    resultDiv.innerText = data.error;
    outputContainer.style.display = "block";
    return;
  }

  outputContainer.style.display = "block";
  resultDiv.innerHTML = `
    <div><span class="label">Public Key (n, e):</span> {${data.publicKey.n}, ${data.publicKey.e}}</div>
    <div><span class="label">Private Key (n, d):</span> {${data.privateKey.n}, ${data.privateKey.d}}</div>
    <div style="margin-top:10px;"><span class="label">Ciphertext:</span> ${JSON.stringify(data.encrypted)}</div>
    <div><span class="label">Decrypted:</span> <b style="color:white">${data.decrypted}</b></div>
    <div class="step-log">
      <strong>Process Logs:</strong><br>
      ${data.steps.join("<br>")}
    </div>
  `;
}
</script>

</body>
</html>
